version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: execution-engine-queue
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: execution-engine-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Resolves connection back to your Go manager app

  grafana:
    image: grafana/grafana:10.0.0
    container_name: execution-engine-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
